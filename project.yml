name: CodexNotch
options:
  bundleIdPrefix: com.appylabs
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CLANG_ENABLE_MODULES: YES
targets:
  CodexNotchCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/Core
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.appylabs.codexnotch.core
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
    dependencies:
      - sdk: libsqlite3.tbd
  CodexNotch:
    type: application
    platform: macOS
    sources:
      - path: Sources/App
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Codex Notch
        CFBundleShortVersionString: 0.1.0
        CFBundleVersion: 1
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        NSHighResolutionCapable: true
    dependencies:
      - target: CodexNotchCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.appylabs.codexnotch
        PRODUCT_NAME: Codex Notch
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: NO
  CodexNotchCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/CoreTests
    dependencies:
      - target: CodexNotchCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.appylabs.codexnotch.core-tests
        GENERATE_INFOPLIST_FILE: YES
  CodexNotchUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: Tests/UITests
    dependencies:
      - target: CodexNotch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.appylabs.codexnotch.ui-tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  CodexNotch:
    build:
      targets:
        CodexNotch: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CodexNotchCoreTests
        - CodexNotchUITests
  CodexNotchCoreTests:
    build:
      targets:
        CodexNotchCoreTests: [test]
    test:
      config: Debug
      targets:
        - CodexNotchCoreTests
